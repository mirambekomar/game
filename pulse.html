<!DOCTYPE html>
<html lang="ru" class="game-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Пульс — Реакция</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="game-page pulse-page">
  <a class="nav-back" href="index.html">← Меню игр</a>
  <div class="pulse-header">
    <h1 class="title pulse-title">ПУЛЬС</h1>
    <p class="subtitle pulse-subtitle">Нажми цель, пока она не исчезла</p>
    <div class="pulse-stats">
      <div class="ui-element status-pill">
        Счёт: <span id="pulse-score" class="accent-text">0</span>
      </div>
      <div class="ui-element status-pill">
        Время: <span id="pulse-time" class="accent-text">45</span>
      </div>
      <div class="ui-element status-pill pulse-combo-wrap">
        Комбо: <span id="pulse-combo" class="accent-text">×1</span>
      </div>
    </div>
  </div>

  <canvas id="pulseCanvas" aria-label="Игровое поле Пульс"></canvas>

  <div class="pulse-controls">
    <button id="pulse-start-btn" type="button" class="ui-element btn pulse-btn-wide">Старт</button>
  </div>

  <div id="pulse-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="pulse-modal-title">
    <div class="modal-card">
      <h2 id="pulse-modal-title">Игра окончена</h2>
      <p id="pulse-modal-text">Счёт: 0</p>
      <button id="pulse-modal-retry" type="button" class="modal-next-btn">ЕЩЁ РАЗ</button>
    </div>
  </div>

  <script src="pulse.js"></script>
</body>
</html>
