<!DOCTYPE html>
<html lang="ru" class="hub-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Мини-игры</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="hub-page">
  <header class="hub-header">
    <h1 class="title hub-title">Мини-игры</h1>
    <p class="subtitle hub-subtitle">Выберите игру</p>
  </header>

  <main class="hub-grid" role="navigation" aria-label="Список игр">
    <a class="game-card" href="circle-link.html">
      <span class="game-card-badge">Логика</span>
      <h2 class="game-card-title">Circle Link</h2>
      <p class="game-card-desc">Соедините пары цветных точек линиями внутри круга, не пересекая линии.</p>
      <span class="game-card-cta">Играть →</span>
    </a>
    <a class="game-card game-card-alt" href="pulse.html">
      <span class="game-card-badge">Реакция</span>
      <h2 class="game-card-title">Пульс</h2>
      <p class="game-card-desc">Успевайте нажимать на цели, пока они сжимаются. Комбо за серию попаданий.</p>
      <span class="game-card-cta">Играть →</span>
    </a>
  </main>

  <script>
    (function () {
      if (window.Telegram && window.Telegram.WebApp) {
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (typeof tg.disableVerticalSwipes === "function") {
          tg.disableVerticalSwipes();
        }
      }
    })();
  </script>
</body>
</html>
